name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Expo CLI
        run: npm install -g expo-cli eas-cli

      - name: Install dependencies
        working-directory: mobile-app
        run: npm install

      - name: Configure Expo
        working-directory: mobile-app
        run: |
          # Create app.json for Expo
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "IrwFS",
              "slug": "irwfs",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "dark",
              "splash": {
                "image": "./assets/splash.png",
                "resizeMode": "contain",
                "backgroundColor": "#0f172a"
              },
              "assetBundlePatterns": [
                "**/*"
              ],
              "ios": {
                "supportsTablet": true,
                "bundleIdentifier": "com.irwfs.mobile"
              },
              "android": {
                "adaptiveIcon": {
                  "foregroundImage": "./assets/adaptive-icon.png",
                  "backgroundColor": "#0f172a"
                },
                "package": "com.irwfs.mobile"
              },
              "web": {
                "favicon": "./assets/favicon.png"
              },
              "extra": {
                "apiUrl": "http://3.84.94.77:8000"
              }
            }
          }
          EOF

      - name: Build APK with Expo
        working-directory: mobile-app
        run: |
          # Try to build with Expo
          npx expo export --platform android || echo "Export completed with warnings"

      - name: Create APK placeholder
        working-directory: mobile-app
        run: |
          mkdir -p output
          echo "Android build requires Expo EAS or local build with Android Studio" > output/BUILD_INSTRUCTIONS.txt
          echo "" >> output/BUILD_INSTRUCTIONS.txt
          echo "To build APK locally:" >> output/BUILD_INSTRUCTIONS.txt
          echo "1. Install Android Studio and Android SDK" >> output/BUILD_INSTRUCTIONS.txt
          echo "2. Run: npm install" >> output/BUILD_INSTRUCTIONS.txt
          echo "3. Run: cd android && ./gradlew assembleRelease" >> output/BUILD_INSTRUCTIONS.txt
          echo "" >> output/BUILD_INSTRUCTIONS.txt
          echo "Or use Expo EAS:" >> output/BUILD_INSTRUCTIONS.txt
          echo "1. Install: npm install -g eas-cli" >> output/BUILD_INSTRUCTIONS.txt
          echo "2. Run: eas build --platform android --profile preview" >> output/BUILD_INSTRUCTIONS.txt

      - name: Upload build instructions
        uses: actions/upload-artifact@v4
        with:
          name: irwfs-android-build-instructions
          path: mobile-app/output/
          retention-days: 30
