apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

import com.android.build.OutputFile

react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/react-native-codegen")
    cliFile = file("../../node_modules/react-native/cli.js")
    debuggableVariants = ["liteDebug", "fullDebug"]
    
    /* Bundle Commands */
    bundleCommand = "ram-bundle"
    bundleConfig = file(../rn-cli.config.js)
    bundleAssetName = "MyBundle.android.js"
    entryFile = file("../../src/index.tsx")
    extraPackagerArgs = []
}

project.ext.react = [
    enableHermes: true,
]

apply from: "../../node_modules/react-native/react.gradle"

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.irwfs.mobile"
    
    defaultConfig {
        applicationId "com.irwfs.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    
    signingConfigs {
        release {
            storeFile file('release.keystore')
            storePassword 'irwfs123'
            keyAlias 'irwfs'
            keyPassword 'irwfs123'
        }
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "com.facebook.react:react-native:+"
    implementation "com.facebook.react:hermes-android:+"
    
    // Navigation
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    
    // Image Picker
    implementation 'androidx.exifinterface:exifinterface:1.3.6'
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(dependencies)
